{% extends "base.html" %}

{% block content %}
<div class="max-w-xl mx-auto py-16 px-4 sm:py-24 sm:px-6 lg:px-8">
    <div class="text-center">
        <h1 class="text-5xl font-extrabold text-indigo-600 tracking-tight sm:text-6xl">{{ status_code }}</h1>
        <p class="mt-4 text-2xl font-bold text-gray-900 tracking-tight sm:text-3xl">{{ title }}</p>
        <div class="mt-4 p-4 bg-red-50 border-l-4 border-red-400 rounded-md text-left">
            <div class="flex">
                <div class="flex-shrink-0">
                    <!-- Heroicon name: solid/x-circle -->
                    <svg class="h-5 w-5 text-red-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd" />
                    </svg>
                </div>
                <div class="ml-3">
                    <p class="text-sm text-red-700">
                        {{ detail }}
                    </p>
                </div>
            </div>
        </div>
        <div class="mt-8 flex justify-center space-x-4">
            <a href="#" onclick="window.history.back(); return false;" class="inline-flex items-center px-4 py-2 border border-gray-300 shadow-sm text-base font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                &larr; Go back
            </a>
            <a href="/" class="inline-flex items-center px-4 py-2 border border-transparent text-base font-medium rounded-md shadow-sm text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                Go back home
            </a>
        </div>
    </div>
</div>
{% endblock %}
